<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conectar Carteira na Arc</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
  <h2>Conectar Carteira na Arc Testnet</h2>
  <button id="connectButton">Conectar Carteira</button>
  <p id="walletAddress">Endereço: (aguardando conexão...)</p>

  <script>
    const connectButton = document.getElementById('connectButton');
    const walletAddress = document.getElementById('walletAddress');

    connectButton.onclick = async () => {
      if (window.ethereum) {
        try {
          // Solicita acesso às contas
          await window.ethereum.request({ method: 'eth_requestAccounts' });
          const provider = new ethers.providers.Web3Provider(window.ethereum);
          const signer = provider.getSigner();
          const address = await signer.getAddress();

          walletAddress.innerText = 'Endereço: ' + address;
        } catch (err) {
          walletAddress.innerText = 'Erro ao conectar: ' + err.message;
          console.error(err);
        }
      } else {
        walletAddress.innerText = 'MetaMask não encontrada. Instale a extensão.';
      }
    };
  </script>
</body>
</html>
