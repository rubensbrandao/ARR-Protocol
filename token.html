<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARR Protocol</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f4f6;
}
.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#374151;
  color:white;
  cursor:pointer;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="wrap">

<h2>ARR Protocol</h2>

<button id="connectBtn">Connect Wallet</button>
<p id="walletAddress"></p>

<div class="card">
<h3>Swap</h3>

<input id="swapFromAmount" placeholder="USD Amount">

<input id="swapToAmount" placeholder="ARR Output" readonly>

<p id="conversionRate">-</p>

<button id="swapBtn" disabled>Swap</button>
<p id="swapStatus"></p>
</div>

<div class="card">
<h3>Stake</h3>

<input id="stakeAmount" placeholder="Amount">

<button id="stakeBtn">Stake</button>
<button id="unstakeBtn">Unstake</button>

<p id="stakeStatus"></p>
</div>

<div class="card">
<h3>Pool</h3>

<input placeholder="Token A">
<input placeholder="Token B">

<button id="poolBtn">Add Liquidity</button>

<p id="poolStatus"></p>
</div>

</div>

<script>

const CONTRACT_ADDRESS = "0x505d906136cab0EEb11Fa8DCf0FedFC337d64f00";

const CONTRACT_ABI = [
  "function rewardUser(address user, uint256 volumeUSD)",
  "function currentRate() view returns (uint256)",
  "function protocolInventory() view returns (uint256)"
];

let provider, signer, userAddress, contract;

const connectBtn = document.getElementById("connectBtn");
const swapBtn = document.getElementById("swapBtn");

const swapFromAmount = document.getElementById("swapFromAmount");
const swapToAmount = document.getElementById("swapToAmount");

const conversionRate = document.getElementById("conversionRate");
const swapStatus = document.getElementById("swapStatus");

connectBtn.onclick = async () => {
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);

  signer = provider.getSigner();
  userAddress = await signer.getAddress();

  contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

  document.getElementById("walletAddress").innerText = userAddress;

  swapBtn.disabled = false;

  updateRate();
};

async function updateRate(){
  const rate = await contract.currentRate();
  const parsed = ethers.utils.formatUnits(rate,18);
  conversionRate.innerText = "1 USD = " + parsed + " ARR";
}

swapFromAmount.addEventListener("input", async () => {
  const val = parseFloat(swapFromAmount.value || "0");
  if(!val) return swapToAmount.value = "";

  const rate = await contract.currentRate();
  const parsed = parseFloat(ethers.utils.formatUnits(rate,18));

  swapToAmount.value = (val * parsed).toFixed(4);
});

swapBtn.onclick = async () => {
  try{
    const amount = parseFloat(swapFromAmount.value || "0");

    swapStatus.innerText = "Processing...";

    const volume = ethers.utils.parseUnits(amount.toString(),18);

    const tx = await contract.rewardUser(userAddress, volume);
    await tx.wait();

    swapStatus.innerText = "Success 🚀";
  }catch(e){
    swapStatus.innerText = "Error";
  }
};

</script>

</body>
</html>
