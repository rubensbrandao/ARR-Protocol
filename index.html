<!-- 3. TOKEN OVERVIEW -->
<strong id="totalSupply">Loading...</strong>

<!-- SCRIPT (SEM WALLET) -->
<script>
const TOKEN_ADDRESS = "COLOCA_SEU_CONTRATO_AQUI";

const ABI = [
 "function totalSupply() view returns (uint256)"
];

async function loadSupply(){
  try{
    const provider = new ethers.providers.JsonRpcProvider("https://rpc.ankr.com/eth"); // TROCAR PRA ARC
    const contract = new ethers.Contract(TOKEN_ADDRESS, ABI, provider);

    const supply = await contract.totalSupply();
    const formatted = ethers.utils.formatUnits(supply,18);

    document.getElementById("totalSupply").innerText =
      Number(formatted).toLocaleString() + " TOKENS";

  }catch(e){
    console.log(e);
  }
}

loadSupply();
</script>
